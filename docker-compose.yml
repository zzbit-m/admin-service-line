version: "3.9"

services:
  api:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - db
      - redis
      - minio
    networks:
      - portal-network

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: admin_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portal-network

  redis:
    image: redis:7-alpine
    networks:
      - portal-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - portal-network

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - portal-network

volumes:
  postgres_data:
  minio_data:
  n8n_data:

networks:
  portal-network:
    driver: bridge
